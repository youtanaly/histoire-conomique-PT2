<script>
const IDEES = [
  // ── HÉRITAGE DE LA IVe & ARRIVÉE DE DG ──
  {tag:"Héritage de la IVe",tc:"t4",type:"Paradoxe",q:"Pourquoi l'idée selon laquelle la IVe République aurait légué à de Gaulle une économie délabrée est-elle fausse, et quelle est la réalité du bilan ?",a:"La crise ne touche que les finances publiques (déficit budgétaire permanent, balance commerciale déficitaire, inflation à 16% en 1957-1958). Mais l'essentiel du legs est positif : un secteur public puissant, des pratiques de planification éprouvées, de nouvelles mentalités tournées vers l'investissement et la productivité, et la Sécurité sociale comme filet de stabilité sociale. Les atouts compensent largement les handicaps.",n:"La croissance de la IVe parle d'elle-même : 4,6% par an entre 1949 et 1957, 9,4% de croissance industrielle annuelle — des taux supérieurs aux États-Unis et au Royaume-Uni. De Gaulle hérite d'une économie en mouvement, non d'une économie à reconstruire."},
  {tag:"Héritage de la IVe",tc:"t4",type:"Mécanisme",q:"Comment la familiarisation des élites économiques françaises aux notions d'investissement et de productivité constitue-t-elle le leg le plus précieux de la IVe République à la Ve ?",a:"Avant-guerre, les mentalités françaises étaient réfractaires à l'investissement, à la prise de risque et à la concurrence. La IVe, par la planification et les grandes entreprises nationalisées, a ancré l'idée que la croissance passe par l'adaptation permanente au marché international. Ces nouvelles mentalités constituent un capital humain et culturel sans lequel les réformes de la Ve seraient impossibles.",n:"Ce changement de mentalité est l'œuvre d'une génération de hauts fonctionnaires et de technocrates formés au Commissariat au Plan, à l'INSEE et dans les grandes entreprises publiques. Ils constituent le vrai moteur de la modernisation économique, quel que soit le régime politique."},
  {tag:"Héritage de la IVe",tc:"t4",type:"Argument",q:"En quoi l'ouverture extérieure décidée en 1958 n'est-elle pas un choix de rupture avec la IVe, mais l'aboutissement d'une logique engagée depuis 1944 ?",a:"La IVe avait déjà amorcé la libéralisation (accords Blum-Byrnes, OECE, signature du traité de Rome en 1957). Ce que fait de Gaulle en 1959, c'est accélérer et systématiser une dynamique déjà en cours : supprimer 90% des contingentements dès janvier 1959, abaisser rapidement les droits de douane. L'originalité gaullienne est de faire de l'ouverture un instrument délibéré de modernisation forcée des entreprises françaises.",n:"La phrase 'l'intendance suivra' est apocryphe et trompeuse. De Gaulle sait très bien que l'ouverture extérieure est une thérapie de choc pour les industriels français : c'est en les exposant à la concurrence qu'on les force à investir et à se moderniser."},

  // ── VISION ÉCONOMIQUE DE DE GAULLE ──
  {tag:"Vision économique de DG",tc:"t1",type:"Nuance",q:"En quoi la méfiance de De Gaulle envers 'la corbeille' (la Bourse) traduit-elle une vision économique particulière, et non un mépris des questions économiques ?",a:"La formule 'la politique de la France ne se fait pas à la corbeille' exprime un héritage catholique qui redoute que l'argent pollue les valeurs sociales — pas une indifférence aux mécanismes économiques. De Gaulle suit de près la politique économique, multiplie les conseils restreints après 1962, et fait de l'autonomie économique un pilier de la grandeur nationale. Son pragmatisme contraste avec le libéralisme affiché.",n:"Cette posture lui permet d'être à la fois non-dirigiste (il veut que le marché fonctionne) et interventionniste (l'État oriente, stimule, corrige). C'est une troisième voie entre l'étatisme soviétique et le libéralisme américain — conforme à la tradition politique française."},
  {tag:"Vision économique de DG",tc:"t1",type:"Mécanisme",q:"Comment de Gaulle fait-il de l'économie un instrument de puissance nationale plutôt qu'une fin en soi, et quelles en sont les conséquences concrètes ?",a:"Pour DG, l'économie est 'un moyen de grandeur parmi d'autres' : elle doit permettre à la France d'acquérir une autonomie vis-à-vis des crédits internationaux, de rembourser ses dettes par anticipation, et de financer les filières de pointe (nucléaire, aéronautique, spatial). Cela oriente les choix économiques vers des secteurs symboliques de puissance — parfois au détriment de la compétitivité commerciale pure.",n:"Ce prisme de la puissance explique le refus gaullien de dévaluer en novembre 1968 : dévaluer, c'est avouer une faiblesse économique qui entame le prestige international de la France. La défense du franc est politique autant qu'économique."},
  {tag:"Vision économique de DG",tc:"t1",type:"Argument",q:"Pourquoi le plan Pinay-Rueff constitue-t-il un choix libéral courageux pour un général souvent perçu comme étatiste ?",a:"En libérant 90% des échanges, en dévaluant le franc, en comprimant les dépenses publiques et en réduisant les subventions au secteur nationalisé, de Gaulle prend le risque d'exposer l'économie française à la concurrence internationale sans filets. Ce choix de la thérapie de choc libérale aurait pu être politiquement désastreux — il s'avère économiquement fécond, lançant la plus longue période de croissance de l'histoire française.",n:"La nomination d'Antoine Pinay comme ministre des Finances est elle-même un signal libéral : 'thaumaturge financier' et idole des petits épargnants, il incarne la confiance et la rigueur, aux antipodes du dirigisme étatiste que l'opinion attribue à de Gaulle."},
  {tag:"Vision économique de DG",tc:"t1",type:"Nuance",q:"En quoi l'action économique de De Gaulle est-elle guidée par un pragmatisme plutôt que par une idéologie cohérente, et pourquoi ce pragmatisme est-il une force ?",a:"DG n'est ni libéral pur (il maintient le secteur public et la planification) ni dirigiste (il refuse d'imposer des objectifs contraignants et encourage l'investissement privé). Il intervient quand les mécanismes de marché défaillent, laisse faire quand ils fonctionnent. Ce pragmatisme lui permet d'adapter les outils aux circonstances — le plan de stabilisation de 1963, la libéralisation des échanges de 1959, le Plan Calcul de 1968 répondent chacun à une situation précise.",n:"Le comité Rueff-Armand incarne ce pragmatisme : sa mission est de 'discerner et proposer des correctifs aux rigidités de tout ordre, obstacles à l'adaptation harmonieuse de l'économie française aux conditions du marché.' C'est une démarche empirique, non idéologique."},
  {tag:"Vision économique de DG",tc:"t1",type:"Paradoxe",q:"Pourquoi le tournant libéral de 1962 avec l'arrivée de VGE au ministère des Finances survient-il sous un régime gaulliste réputé interventionniste ?",a:"L'économie française, après la phase d'assainissement (1958-1962), n'a plus besoin d'une direction étatique aussi forte : le secteur privé, modernisé et reconstruit, peut prendre le relais de l'investissement. Les Ve et VIe plans reflètent ce glissement : ils encouragent l'investissement privé pour substituer au maximum aux interventions des organismes publics. Le libéralisme de VGE est la conséquence logique du succès de la planification gaullienne.",n:"Ce tournant libéral illustre une continuité de fond entre IVe et Ve Républiques : l'État accompagne la croissance quand le secteur privé est faible, puis se dégage quand il est suffisamment fort. La planification française a toujours été un outil temporaire, non un modèle permanent."},

  // ── FACTEURS DE CROISSANCE ──
  {tag:"Facteurs de croissance",tc:"t2",type:"Mécanisme",q:"Comment la dépendance énergétique délibérément acceptée envers le pétrole permet-elle la croissance française, et quel risque majeur fait-elle peser ?",a:"Les prix du pétrole sont bas et décroissants de 1960 à 1973 : accepter la dépendance pétrolière, c'est accepter une énergie bon marché qui réduit les coûts de production et rend les produits français compétitifs. Le Plan Jeanneney (1959) ferme délibérément les mines de charbon non rentables et investit dans le raffinage et la pétrochimie. Mais cette dépendance à hauteur de 75% des besoins énergétiques crée une vulnérabilité systémique qui éclatera avec le choc pétrolier de 1973.",n:"La priorité donnée au pétrole conduit à freiner le développement du nucléaire civil, jugé trop compliqué et moins compétitif. C'est un choix rationnel en 1960, mais qui retardera la diversification énergétique française — avant que le second choc pétrolier ne force enfin le grand tournant nucléaire."},
  {tag:"Facteurs de croissance",tc:"t2",type:"Paradoxe",q:"Pourquoi l'ouverture des frontières, risque économique apparent pour une industrie française encore fragile, se révèle-t-elle être le moteur le plus puissant de la modernisation ?",a:"En exposant les entreprises françaises à la concurrence européenne et mondiale, l'ouverture les force à investir, à se concentrer, à améliorer leur productivité — sous peine de disparaître. C'est une contrainte externe qui produit un résultat que la planification seule n'aurait jamais obtenu : une transformation profonde des mentalités patronales. La concurrence internationale est plus efficace que n'importe quelle injonction étatique.",n:"De Gaulle surenchérit volontairement sur les clauses du traité de Rome : il supprime 90% des contingentements dès janvier 1959, avant même les délais prévus. Ce choix d'aller plus vite que prévu est caractéristique de la méthode — utiliser l'engagement européen comme levier de réforme intérieure."},
  {tag:"Facteurs de croissance",tc:"t2",type:"Argument",q:"Pourquoi l'effort d'investissement des années 1960-1973 constitue-t-il une véritable rupture avec la culture économique française traditionnelle ?",a:"La France d'avant-guerre était caractérisée par le refus du risque, la préférence pour la rente sur l'investissement productif, et la prédominance des petites entreprises familiales. La croissance de 7,4% par an des investissements entre 1960 et 1973 signifie que les entreprises et les ménages français ont massivement changé de comportement : ils investissent, s'endettent, prennent des risques. C'est un tournant anthropologique autant qu'économique.",n:"La transformation la plus significative est que plus des deux tiers de ces investissements massifs viennent désormais de capitaux privés — l'État oriente et incite, mais ce sont les acteurs privés qui financent. La France est devenue une économie de marché investissante."},
  {tag:"Facteurs de croissance",tc:"t2",type:"Nuance",q:"En quoi la croissance française des années 1958-1973 est-elle à la fois un phénomène national et le simple reflet d'une conjoncture internationale favorable ?",a:"La France connaît 5,5% de croissance annuelle en moyenne — performance honorable par rapport à ses voisins. Mais cette croissance s'inscrit dans une excellente conjoncture mondiale qui bénéficie à tous les pays industrialisés : énergie bon marché, expansion du commerce international, reconstruction européenne. La France ne fait que rattraper son retard dans un contexte particulièrement porteur. Sa performance propre tient à ses choix de politique économique, mais la conjoncture mondiale est une condition nécessaire.",n:"Cette nuance est importante pour évaluer le 'miracle gaullien' : la croissance aurait vraisemblablement eu lieu de toute façon, portée par la vague mondiale. Ce que la Ve République apporte en propre, c'est sa régularité (plus constante que l'Allemagne), l'ampleur des réformes structurelles et la qualité de la gestion des grands équilibres."},

  // ── PLAN PINAY-RUEFF ──
  {tag:"Plan Pinay-Rueff",tc:"t3",type:"Mécanisme",q:"Pourquoi la libéralisation des échanges est-elle présentée comme 'la mesure la plus importante' du plan Pinay-Rueff, et comment surprend-elle ?",a:"Elle surprend car elle tient les promesses des gouvernements précédents qui n'avaient jamais osé les mettre en œuvre. Libérer les échanges, c'est accepter que des produits étrangers moins chers entrent sur le marché français — risque considérable pour des industries peu compétitives. Mais c'est aussi la seule façon de forcer les entreprises françaises à se moderniser. La libéralisation est à la fois une contrainte et un stimulant.",n:"Cette cohérence entre engagement européen (traité de Rome entrant en vigueur le 1er janvier 1959) et réforme intérieure est caractéristique de la méthode Rueff : utiliser des contraintes externes pour imposer des réformes que la politique intérieure n'aurait pas permises."},
  {tag:"Plan Pinay-Rueff",tc:"t3",type:"Argument",q:"Pourquoi la création du 'franc lourd' est-elle d'abord une mesure psychologique, et en quoi cet aspect psychologique est-il une dimension économique à part entière ?",a:"Le franc lourd (100 anciens francs = 1 nouveau franc) ne change rien aux fondamentaux économiques : il ne modifie pas le pouvoir d'achat, les dettes ou les prix relatifs. Mais il place symboliquement le franc au même niveau que le mark ou le franc suisse, signalant aux marchés et aux épargnants que la France a rompu avec son passé inflationniste. La confiance est un bien économique réel : sans elle, aucune politique de stabilisation ne fonctionne.",n:"Antoine Pinay est lui-même une mesure psychologique : sa nomination comme ministre des Finances est un signal envoyé aux milieux d'affaires et aux petits épargnants. L'économie fonctionne autant par les anticipations des acteurs que par les mécanismes réels — DG l'a parfaitement compris."},

  // ── PHASES DE CROISSANCE ──
  {tag:"Phases de croissance",tc:"t5",type:"Mécanisme",q:"Pourquoi la deuxième phase (1959-1963) est-elle qualifiée de 'la plus belle période' des années 1958-1973, et quelles en sont les ombres ?",a:"Elle cumule tous les avantages : forte croissance du PIB (+8,1% par an), plein emploi (chômage en dessous de 100 000 en 1963), hausse des salaires réels, retour des grands équilibres financiers, excédent de la balance des paiements et multiplication par 5 des réserves d'or. Mais des ombres apparaissent dès 1961 : poussée salariale, retour des pieds-noirs, tensions inflationnistes — qui imposent le Plan de stabilisation de 1963.",n:"Les réserves d'or de la BdF qui se multiplient par 5 pendant cette période sont le signe le plus spectaculaire de la réussite : c'est l'inverse exact de la situation de 1957-1958 où la France vivait à crédit. DG, attaché à l'or comme symbole de souveraineté monétaire, en tire une fierté particulière."},
  {tag:"Phases de croissance",tc:"t5",type:"Paradoxe",q:"Pourquoi le refus de dévaluer en novembre 1968 par De Gaulle, économiquement coûteux, est-il cohérent avec sa vision de la grandeur nationale ?",a:"Après les accords de Grenelle (hausse du SMIG de 30%), la France connaît une forte inflation et une fuite des capitaux. La dévaluation est économiquement logique. Mais dévaluer, c'est reconnaître publiquement la défaite économique de la France après la crise de mai — ce que DG refuse catégoriquement. Il choisit la rigueur et perd le référendum de 1969. Pompidou dévaluera ensuite : victoire du réalisme économique sur le symbole politique.",n:"Ce refus de dévaluer illustre le hiatus entre la logique du marché et la logique politique gaullienne. De Gaulle aurait pu sauver sa présidence en dévaluant ; il préfère perdre le pouvoir en défendant le franc. La monnaie est pour lui une question de dignité nationale, non de compétitivité."},
  {tag:"Phases de croissance",tc:"t5",type:"Argument",q:"En quoi les cinq phases de la croissance illustrent-elles que les chocs politiques (rapatriement des pieds-noirs, mai 1968) ont des effets économiques majeurs et durables ?",a:"Le retour de 700 000 pieds-noirs en 1962 relance brusquement la demande, déclenche des tensions salariales et justifie le Plan de stabilisation de 1963. Les accords de Grenelle de mai 1968 entraînent +30% du SMIG, +19% de masse monétaire, +7,2% d'inflation en un an, une balance commerciale qui bascule dans le rouge et une fuite des capitaux réduisant l'or de la BdF de 30%. La politique et l'économie sont inextricablement liées.",n:"Ces deux exemples révèlent une vulnérabilité structurelle de la croissance française : elle est sensible aux chocs de demande (rapatriés, hausses de salaires) et aux anticipations inflationnistes. La stabilité de la croissance repose autant sur la paix sociale que sur les politiques économiques formelles."},
  {tag:"Phases de croissance",tc:"t5",type:"Nuance",q:"Pourquoi la cinquième phase (1969-1973), sous Pompidou, est-elle à la fois une continuation et une inflexion par rapport à la politique gaullienne ?",a:"Pompidou continue les grandes orientations : modernisation industrielle, planification, ouverture extérieure. Mais il dévalue le franc en 1969 (ce que DG refusait), est plus perméable aux sollicitations patronales (sa carrière chez Rothschild l'y prédispose), et accentue le tournant libéral : création du SMIC, indexation du minimum vital, 'contrats de progrès.' Ces mesures relancent la croissance mais alimentent aussi l'inflation. L'inflexion est réelle, la rupture non.",n:"La dévaluation de 11% en août 1969 répond aux vœux du patronat et permet effectivement de relancer la croissance. Mais elle introduit aussi une logique inflationniste que Pompidou peine à contrôler — préfigurant les difficultés des années post-choc pétrolier."},

  // ── MODERNISATION AGRICOLE ──
  {tag:"Modernisation agricole",tc:"t6",type:"Mécanisme",q:"Comment le gouvernement Debré parvient-il à moderniser une agriculture archaïque protégée par tous les partis politiques, et quel est son levier stratégique ?",a:"Il s'appuie sur le Centre national des Jeunes Agriculteurs (CNJA), élément moderniste du monde rural qui comprend que la survie de l'agriculture passe par sa transformation. En légitimant la réforme par les paysans eux-mêmes (et non en l'imposant de l'extérieur), Debré contourne les résistances des partis politiques qui défendent le petit propriétaire. La loi d'orientation de 1960-1962 et les SAFER institutionnalisent cette logique.",n:"La JAC (Jeunesse agricole chrétienne) est le vivier du CNJA : 440 000 adhérents en 1955, formés à une vision moderne et entrepreneuriale de l'agriculture. Ce mouvement de jeunesse catholique est paradoxalement le principal vecteur de la révolution agricole capitaliste — preuve que les transformations économiques naissent souvent d'acteurs culturellement inattendus."},
  {tag:"Modernisation agricole",tc:"t6",type:"Paradoxe",q:"Pourquoi la modernisation agricole, voulue par une partie des jeunes paysans, suscite-t-elle un profond malaise dans le monde rural, et comment ce paradoxe s'explique-t-il ?",a:"La modernisation est portée par les jeunes agriculteurs dynamiques du CNJA, mais elle menace directement les exploitants qui ne peuvent pas en suivre le rythme — majorité de petites exploitations en dessous du seuil de rentabilité. De plus, le Marché commun agricole (1962) crée des concurrents pour le vin, les fruits, les légumes et les produits laitiers. La réforme est voulue par ceux qui peuvent en profiter, subie par ceux qui en font les frais.",n:"Le rapport Mansholt de 1968 radicalise ce malaise : en préconisant la suppression de la moitié des agriculteurs de la CEE en dix ans, le vice-président de la Commission européenne dit tout haut ce que la logique économique impose. Cette brutalité technocratique explique les barrages routiers et manifestations du monde rural."},
  {tag:"Modernisation agricole",tc:"t6",type:"Argument",q:"En quoi la création du Marché commun agricole en 1962 est-elle le résultat d'un calcul politique autant qu'économique de la part de la France ?",a:"La France accepte la libéralisation industrielle (qui profite aux industriels allemands et néerlandais) en échange de la mise en place du Marché commun agricole. Ce système de prix garantis et de subventions permet aux agriculteurs français de bénéficier du grand marché européen. C'est un échange de bons procédés : liberté de circulation des produits industriels contre protection des produits agricoles. La France joue sa carte agricole majeure.",n:"Cet échange révèle la structure des avantages comparatifs français en 1962 : compétitif dans l'agriculture, encore fragile dans l'industrie. À mesure que l'industrie française se modernise, les termes de l'échange européen évolueront — mais la PAC restera le pilier de l'intégration européenne pendant des décennies."},
  {tag:"Modernisation agricole",tc:"t6",type:"Nuance",q:"En quoi la 'révolution silencieuse' agricole des années 1958-1973 est-elle à la fois un succès économique et une transformation sociale douloureuse ?",a:"Economiquement : la productivité agricole progresse à 6,3% par an de 1952 à 1974, la France atteint le premier rang européen de production et le second mondial à l'exportation. Mais socialement : entre 1958 et 1972, 13% de la population active quitte l'agriculture (de 25% à 12%), représentant des millions d'exodes ruraux, de disparitions de communautés, de ruptures culturelles. La révolution est silencieuse parce que ses victimes ne font pas de bruit — elles partent.",n:"Les 44 000 tracteurs de 1946 devenant 1 500 000 en 1980 résument à eux seuls la transformation : une agriculture de labeur humain devient une agriculture mécanisée et intensive. La consommation d'engrais quintuplant entre 1950 et 1978 illustre cette chimisation de l'agriculture — avec des conséquences environnementales que les contemporains ne perçoivent pas."},

  // ── MODERNISATION INDUSTRIELLE ──
  {tag:"Modernisation industrielle",tc:"t3",type:"Mécanisme",q:"Pourquoi la politique de concentration industrielle est-elle une nécessité née de l'ouverture des frontières, et non un choix idéologique de l'État gaulliste ?",a:"L'ouverture à la concurrence internationale impose aux entreprises françaises une taille critique minimale pour affronter les géants américains, allemands et japonais. La PME familiale française, viable sur un marché protégé, est condamnée sur un marché ouvert. La concentration n'est pas un choix de l'État mais une contrainte du marché — l'État ne fait qu'en faciliter la réalisation par des mesures fiscales et juridiques (Groupements d'intérêt économique, 1967).",n:"Le nombre de concentrations de SA passe de 850 sur la décennie 1950-1960 à 1850 sur la décennie 1961-1970 — plus du double. Cette accélération suit directement l'ouverture des frontières et le Ve Plan. La logique est limpide : la concurrence contraint à la concentration, la concentration améliore la productivité."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Paradoxe",q:"Pourquoi la France, malgré une politique volontariste de concentration industrielle, ne réussit-elle pas à créer les grands groupes internationaux dont rêvait Pompidou ?",a:"L'État concentre ses efforts sur quelques filières stratégiques (pétrole, banque, aéronautique) mais peine à structurer des champions dans la chimie, l'informatique, la mécanique ou la sidérurgie. Même Renault, premier groupe français, n'est que 22e mondial. La France a des 'champions nationaux' mais pas de multinationales dominantes. L'ambition pompidolienne se heurte à la réalité des délais nécessaires pour forger de vrais leaders mondiaux.",n:"Cette limite révèle une tension dans la politique industrielle : l'État peut concentrer, mais il ne peut pas créer la culture entrepreneuriale internationale qui fait les vrais champions mondiaux. Michelin (pneumatiques), Péchinay-Ugine-Khülmann (aluminium), Renault, Peugeot-Citroën — quelques succès dans des secteurs limités, une absence quasi totale dans les technologies de l'avenir."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Argument",q:"En quoi le rôle de Pompidou dans la modernisation industrielle est-il sous-estimé par rapport à celui de De Gaulle, et pourquoi mérite-t-il d'être mis en valeur ?",a:"Pompidou place 'l'impératif industriel' au premier plan de ses préoccupations, qu'il soit Premier ministre ou Président. Il marque son action d'une série de grands projets : BNP (fusion bancaire), SNECMA, Plan Calcul, programme spatial. Moins attaché que DG au symbolisme de la puissance, il est plus attentif aux réalités industrielles concrètes. Son background chez Rothschild lui donne une compréhension des mécanismes financiers que DG n'a pas.",n:"La tension entre DG et Pompidou sur la politique économique est réelle : DG résiste à la dévaluation de 1968, Pompidou la juge nécessaire. Pompidou est plus libéral et plus orienté vers l'industrie ; DG plus attaché à la rigueur monétaire et au prestige national. Ces deux logiques sont complémentaires plutôt que contradictoires."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Nuance",q:"En quoi les grands groupes financiers (Suez, Rothschild, Paribas, Empain-Schneider) jouent-ils un rôle ambigu dans la modernisation industrielle française ?",a:"Leur investissement massif dans l'industrie comble un manque que l'État seul ne peut pas financer — ils sont donc indispensables à la modernisation. Mais en prenant en main 'une notable partie de l'économie française', ils recréent le 'pouvoir des trusts' que la Libération avait voulu démanteler. La modernisation industrielle gaulliste réhabilite paradoxalement les grands intérêts financiers privés que le programme du CNR voulait soumettre à l'État.",n:"Ce paradoxe est caractéristique de la Ve République libérale : l'État crée les conditions (fusions, GIE, aides sectorielles) puis laisse le privé prendre le relais. La frontière entre État industriel et capitalisme financier se brouille — préfigurant les privatisations des années 1980."},

  // ── DÉSÉQUILIBRES & OMBRES ──
  {tag:"Déséquilibres & ombres",tc:"t7",type:"Mécanisme",q:"Pourquoi les déséquilibres régionaux résistent-ils aux politiques d'aménagement du territoire malgré la DATAR et les préfets de région ?",a:"Les inégalités régionales sont en partie issues de données naturelles et géographiques que l'action humaine ne peut pas aisément modifier : la concentration en Île-de-France, dans le Nord ou la vallée du Rhône tient à des siècles d'infrastructure, de tradition industrielle et de densité de marchés. La DATAR peut attirer quelques entreprises en zone critique par des aides fiscales, mais ne peut pas déplacer les flux humains et capitalistiques qui obéissent à leur propre logique.",n:"Jean-François Gravier avait anticipé ce phénomène dès 1947 dans 'Paris et le désert français.' La Ve République crée des institutions (DATAR en 1963, préfets de région en 1964) mais de Gaulle lui-même n'en fait pas une priorité. Le référendum de 1969 sur la régionalisation sera le dernier acte — son rejet par les Français met fin au projet."},
  {tag:"Déséquilibres & ombres",tc:"t7",type:"Paradoxe",q:"Pourquoi la croissance accentue-t-elle les déséquilibres régionaux et sectoriels plutôt que de les résorber naturellement ?",a:"La croissance concentre les richesses là où existent déjà les avantages comparatifs : zones urbaines dotées d'infrastructures, de main-d'œuvre qualifiée et de marchés accessibles (Île-de-France, Nord, vallée du Rhône). Pendant ce temps, les régions à industries traditionnelles (textile alsacien et normand, charbon du Nord, sidérurgie lorraine) souffrent de la concurrence et de la transition énergétique. La croissance est un phénomène sélectif qui amplifie les dynamiques existantes.",n:"Ce phénomène est universel dans les économies de marché en phase de modernisation rapide : les secteurs porteurs attirent les capitaux et les talents, les secteurs déclinants se vident. La seule question est politique : jusqu'où l'État doit-il compenser ces inégalités, et à quel coût ?"},
  {tag:"Déséquilibres & ombres",tc:"t7",type:"Argument",q:"Pourquoi l'inflation constitue-t-elle le 'cancer permanent' de la croissance française, malgré des politiques répétées de stabilisation ?",a:"L'inflation française a des causes à la fois conjoncturelles (guerre d'Algérie, rapatriement des pieds-noirs, mai 1968) et structurelles (indexation des salaires, poids des syndicats, politique contractuelle dans les entreprises publiques). Ces causes structurelles résistent aux plans de stabilisation successifs : une fois la rigueur levée, la spirale prix-salaires repart. De plus, les gouvernements trouvent des avantages politiques à l'inflation (financement indolore de la croissance, remboursement facilité des dettes).",n:"La phrase clé est : 'les gouvernements trouvent dans l'inflation des avantages politiques à court terme.' C'est une économie politique de l'inflation : elle est tolérée car elle bénéficie à court terme aux débiteurs (État, classes moyennes endettées) et facilite la croissance. Ses victimes — rentiers, épargnants, détenteurs de revenus fixes — sont politiquement moins influentes."},
  {tag:"Déséquilibres & ombres",tc:"t7",type:"Nuance",q:"En quoi la fragilité structurelle du commerce extérieur français révèle-t-elle les limites de la modernisation industrielle accomplie entre 1958 et 1974 ?",a:"La balance commerciale est excédentaire grâce aux produits agricoles et alimentaires, mais se détériore rapidement dans l'énergie (dépendance pétrolière) et les produits manufacturés (concurrence internationale). Après l'excédent de 1965, la balance ne cesse de se fragiliser. Cela signifie que la France exporte bien ses matières premières agricoles mais reste importatrice nette de produits industriels sophistiqués — signe que la modernisation industrielle est réelle mais incomplète.",n:"Cette fragilité est aussi un héritage de la spécialisation choisie par le plan Monnet (industries de base) et par la politique gaulliste (filières de prestige : nucléaire, aéronautique, spatial). Ces choix sont symboliquement et stratégiquement cohérents, mais ne constituent pas une base d'exportation manufacturière large et diversifiée."},
  {tag:"Déséquilibres & ombres",tc:"t7",type:"Mécanisme",q:"Comment la crise de mai-juin 1968 révèle-t-elle les tensions sociales sous-jacentes à la croissance des Trente Glorieuses ?",a:"La croissance produit de la richesse mais de façon inégale : les 'laissés pour compte' (secteurs en crise, régions défavorisées, ouvriers dont les salaires ne progressent pas au rythme de la productivité) accumulent une frustration que le contraste avec la prospérité 'insolente' des secteurs dynamiques rend insupportable. Mai 1968 est la rupture de ce refoulé social : il ne suffit pas que l'économie croisse, encore faut-il que tous perçoivent une part équitable des fruits de cette croissance.",n:"Les accords de Grenelle tentent de répondre à cet enjeu : +30% du SMIG, accords salariaux dans tous les secteurs. Mais ils le font en alimentant l'inflation — déplaçant le problème plutôt qu'en le résolvant. La question de la redistribution des fruits de la croissance restera le nœud gordien de la politique économique française jusqu'aux années 1980."},

  // ── BILAN & CONTINUITÉS ──
  {tag:"Bilan & continuités",tc:"t2",type:"Argument",q:"En quoi la période 1958-1974 représente-t-elle l'apogée d'un modèle économique français spécifique, et pourquoi ce modèle n'est-il pas entièrement le fait de la Ve République ?",a:"Le modèle — planification indicative + secteur public puissant + ouverture progressive + investissement massif — a été conçu et expérimenté sous la IVe. La Ve en réalise l'apogée grâce à la stabilité politique et à la rigueur des grands équilibres. Mais les conditions de sa réussite (énergie bon marché, conjoncture mondiale favorable, marché européen en expansion) disparaissent avec le choc pétrolier de 1973. L'apogée est aussi le moment où les limites du modèle apparaissent.",n:"Cette continuité profonde entre IVe et Ve est souvent effacée par le récit gaulliste qui présente 1958 comme une rupture totale. En réalité, l'équipe technocratique (Commissariat au Plan, INSEE, grandes écoles) est largement la même. Ce sont les conditions politiques qui changent — et elles comptent, mais elles s'exercent sur un substrat économique en place depuis 1944."},
  {tag:"Bilan & continuités",tc:"t2",type:"Nuance",q:"Pourquoi peut-on dire que le choc pétrolier de 1973 marque la fin d'une époque économique autant que le début d'une crise ?",a:"Il révèle la vulnérabilité structurelle du modèle de croissance français : dépendance énergétique à 75%, spécialisation dans des secteurs peu adaptés à la concurrence des pays en développement, inflation chronique. Ces fragilités existaient avant 1973 mais étaient masquées par la conjoncture favorable. Le choc pétrolier ne crée pas les problèmes — il les révèle et les amplifie. C'est la fin des Trente Glorieuses au sens propre : la période où une conjoncture exceptionnelle permettait de différer les réformes structurelles.",n:"La formule des 'Trente Glorieuses' (Jean Fourastié, 1979) a été forgée rétrospectivement, précisément parce que le choc de 1973 a rendu visible l'exceptionnalité de la période précédente. Les contemporains vivaient la croissance comme normale et permanente — l'erreur sera de croire qu'elle pouvait l'être indéfiniment."}
];

const FAITS = [
  // ── BILAN DE LA IVe & HÉRITAGE ──
  {tag:"Héritage de la IVe",tc:"t4",type:"Croissance",q:"Quels sont les taux de croissance légués par la IVe à la Ve République, et que prouvent-ils ?",a:"Croissance de 4,6% par an entre 1949 et 1957 (supérieure aux USA et au Royaume-Uni). Croissance industrielle de 9,4% par an sur la même période. Ces chiffres démontrent que la Ve hérite d'une économie déjà en plein essor, et non d'une économie délabrée.",n:"La seule crise réelle est financière : déficit budgétaire permanent depuis 1949, balance commerciale déficitaire atteignant 2,4% du PIB en 1957, inflation à 16% en 1957-1958. C'est sur ce socle qu'intervient le plan Pinay-Rueff."},
  {tag:"Héritage de la IVe",tc:"t4",type:"Crise 1957-1958",q:"Quels sont les indicateurs de la crise économique que trouve De Gaulle à son arrivée au pouvoir en 1958 ?",a:"Inflation de 16% en 1957-1958. Première chute du PIB marchand depuis 1949. Déficit de la balance commerciale à 2,4% du PIB en 1957. Tentative de dévaluation déguisée de 20% par le gouvernement précédent, qui contient le déficit commercial mais provoque un ralentissement et une forte hausse des prix.",n:"La dévaluation déguisée du gouvernement Gaillard était insuffisante et n'a pas résolu les causes profondes de l'inflation. DG hérite donc d'une économie aux finances publiques dégradées, mais dont les structures productives sont en plein développement."},

  // ── PLAN PINAY-RUEFF ──
  {tag:"Plan Pinay-Rueff",tc:"t3",type:"Mesures fiscales",q:"Quelles sont les mesures fiscales du plan Pinay-Rueff pour résorber le déficit des finances publiques ?",a:"Augmentation des impôts : taxe sur les sociétés et les hauts revenus, majoration de taxes diverses (vins, alcools, tabac), lourde hausse de l'impôt sur les bénéfices commerciaux, augmentation du prix de l'essence. Compression des dépenses : réduction des subventions au secteur nationalisé et aux entreprises publiques (SNCF), suppression du versement de la retraite des Anciens combattants valides en 1959.",n:"Ces mesures sont impopulaires mais nécessaires pour restaurer la crédibilité financière de la France. La suppression de la retraite des Anciens combattants valides en 1959 est symboliquement forte : elle montre que personne n'est épargné par la rigueur."},
  {tag:"Plan Pinay-Rueff",tc:"t3",type:"Monnaie",q:"Quelles sont les mesures monétaires du plan Pinay-Rueff, et quel est le résultat de la dévaluation ?",a:"Dévaluation du franc de 17,4%. Suppression des indexations pour stabiliser la valeur de la monnaie. Création du 'Franc lourd' (1 nouveau franc = 100 anciens francs), plaçant le franc au même niveau que le mark ou le franc suisse. Rétablissement de la convertibilité du franc.",n:"Cette dévaluation de 17,4% tranche avec le refus de dévaluer qui caractérisera ensuite la politique gaullienne. En 1958, la dévaluation est assumée comme nécessaire et couplée à des réformes structurelles — elle n'est pas la capitulation monétaire que sera celle de Pompidou en 1969."},
  {tag:"Plan Pinay-Rueff",tc:"t3",type:"Commerce",q:"Quelle est la mesure phare du plan Pinay-Rueff en matière de commerce extérieur, et comment s'inscrit-elle dans le cadre européen ?",a:"Libéralisation de 90% des échanges européens et de 50% des échanges avec la zone dollar dès le 1er janvier 1959. Cette mesure surprend car elle tient les promesses des gouvernements précédents. Elle coïncide avec l'entrée en vigueur du traité de Rome (1er janvier 1959).",n:"La France surenchérit volontairement sur les obligations du traité de Rome : là où le traité prévoyait une libéralisation progressive sur plusieurs années, DG décide de le faire immédiatement et massivement. C'est un choix délibéré de thérapie de choc pour les entreprises françaises."},

  // ── POLITIQUE COMMERCIALE & EUROPÉENNE ──
  {tag:"Politique commerciale & européenne",tc:"t5",type:"Droits de douane",q:"Quelle est l'évolution des droits de douane français entre 1959 et 1968 ?",a:"Suppression de 90% des contingentements dès janvier 1959. Abaissement des droits de douane de 50% en 1962. Suppression totale des droits de douane le 1er juillet 1968 (entre pays de la CEE). En échange de cette libéralisation industrielle, la France impose en 1962 la mise en place du Marché commun agricole.",n:"Cette progression rapide — plus rapide que les délais prévus par le traité de Rome — est caractéristique de la méthode gaullienne : utiliser les engagements européens comme levier de réforme intérieure forcée. Chaque étape de libéralisation est une contrainte imposée aux industriels français pour les forcer à se moderniser."},
  {tag:"Politique commerciale & européenne",tc:"t5",type:"Exportations",q:"Comment les exportations françaises évoluent-elles entre 1959 et 1973, et quelles parts de la production sont exportées ?",a:"Part de la production agricole exportée : de 4% en 1959 à 14% en 1972. Part des biens d'équipement exportée : de 18% à 26%. Exportations françaises représentant 10,5% du PNB en 1965, plaçant la France au 4e rang des pays exportateurs. Balance commerciale excédentaire dès 1959, restant positive jusqu'en 1963.",n:"Ces chiffres illustrent la réussite de l'ouverture extérieure : les entreprises françaises ont su s'adapter à la concurrence internationale et conquérir des marchés. L'agriculture (portée par la PAC) et les biens d'équipement sont les secteurs les plus dynamiques à l'export."},

  // ── CONJONCTURE INTERNATIONALE & ÉNERGIE ──
  {tag:"Conjoncture & énergie",tc:"t5",type:"Comparaison internationale",q:"Comment se situe la France parmi les grandes puissances industrielles en termes de croissance entre 1950 et 1970 ?",a:"Japon : 10,9% de croissance moyenne. Allemagne : 5,5%. Italie : légèrement au-dessus de la France. France : 4,3% en moyenne de 1950 à 1970, 5,5% en moyenne de 1958 à 1973. Royaume-Uni : 2,8%. États-Unis : 3,9%. La France se situe dans le peloton de tête, devant les Anglo-Saxons, derrière les 'miracles économiques' asiatique et allemand.",n:"La croissance française apparaît même plus régulière que celle de l'Allemagne sur certaines phases, ce qui conduit certains observateurs à prédire dans les années 1970-1980 que la France sera la première puissance économique d'Europe. Ce pronostic sera démenti par les difficultés des années 1980."},
  {tag:"Conjoncture & énergie",tc:"t5",type:"Énergie",q:"Quelle est l'évolution de la consommation énergétique française et de la part des différentes sources entre 1960 et 1973 ?",a:"La consommation d'énergie double en France de 1960 à 1973. La part des hydrocarbures (gaz et liquides) passe de 18% à 75% de la consommation totale. La part du charbon s'effondre. La France dépend à hauteur de 75% des importations pour couvrir ses besoins énergétiques.",n:"Cette transformation radicale de la structure énergétique est le résultat d'un choix délibéré du Plan Jeanneney (1959) : fermer les mines de charbon non rentables et miser sur le pétrole bon marché. Ce choix est rationnel en 1960 et catastrophique en 1973."},
  {tag:"Conjoncture & énergie",tc:"t5",type:"Plan Jeanneney",q:"Que prévoit le Plan Jeanneney de 1959 et quelles en sont les conséquences sur la politique énergétique française ?",a:"Fermeture des mines de charbon les moins rentables. Accent mis sur l'équipement pétrolier du pays, les industries de raffinage et de la pétrochimie. Conséquence : le développement de l'énergie nucléaire est freiné, jugée trop compliquée et moins compétitive que le pétrole.",n:"Ce choix de retarder le nucléaire civil se révélera une erreur stratégique à partir de 1973 : la France devra alors engager massivement dans le nucléaire (programme Messmer) pour rattraper le retard accumulé. Les deux chocs pétroliers sont le prix à payer pour le Plan Jeanneney."},

  // ── INVESTISSEMENT ──
  {tag:"Investissement",tc:"t2",type:"Chiffres",q:"Quel est le rythme de croissance des investissements en France entre 1960 et 1973, et comment se répartissent-ils entre public et privé ?",a:"Les investissements croissent en moyenne de 7,4% par an entre 1960 et 1973. La part des investissements publics (administrations et entreprises publiques) ne cesse de décliner au profit des investissements privés, qui finissent par doubler les investissements publics. L'investissement progresse de 9% par an pendant la deuxième phase (1959-1963).",n:"Ce renversement de la structure de l'investissement (public vers privé) est l'indicateur le plus clair du tournant libéral : l'État a rempli son rôle d'amorçage, le secteur privé prend le relais. C'est exactement ce que visaient les Ve et VIe plans."},

  // ── PHASES DE CROISSANCE ──
  {tag:"Phases de croissance",tc:"t1",type:"Phase 1",q:"Quelles sont les caractéristiques économiques de la première phase (1958, urgences) et comment s'achève-t-elle ?",a:"Poursuite des tendances négatives léguées par la crise de 1958 : diminution de la production industrielle et du PIB, chute de l'investissement de 5%, gains de productivité nuls, hausse du coût de la vie de 3,7% en six mois. La phase s'achève fin décembre 1958 avec la dévaluation du franc de 17,4% dans le cadre du plan Pinay-Rueff.",n:"Cette phase de six mois illustre qu'un changement de régime politique ne modifie pas immédiatement les tendances économiques. Les effets du plan Pinay-Rueff ne se feront sentir qu'à partir du début 1959."},
  {tag:"Phases de croissance",tc:"t1",type:"Phase 2",q:"Quels sont les indicateurs économiques de la deuxième phase (début 1959 - fin 1963), qualifiée de 'la plus belle période' ?",a:"PIB marchand : +8,1% par an. Accroissement de la productivité du travail. Investissements progressant en moyenne de 9% par an. Chômage tombant en dessous de 100 000 en 1963. Forte baisse du déficit budgétaire. Balance des paiements excédentaire. Réserves d'or de la BdF multipliées par 5. Remboursement par anticipation de la plus grande partie de la dette extérieure (1959-1962).",n:"La multiplication par 5 des réserves d'or de la BdF est l'indicateur le plus spectaculaire : c'est l'exact inverse de la situation de 1957-1958. DG peut désormais parler de la 'grandeur financière' de la France — et il le fait, en demandant à la BdF de convertir les dollars détenus en or, défiant le système de Bretton Woods."},
  {tag:"Phases de croissance",tc:"t1",type:"Pieds-noirs",q:"Quels sont les effets économiques du retour des pieds-noirs en 1962 et la réponse politique ?",a:"Retour de 700 000 pieds-noirs en 1962, relançant brusquement la demande de biens de consommation et d'équipement. Poussée des salaires due aux besoins en main-d'œuvre. Risque de dérapage inflationniste. Réponse : Plan de stabilisation de Giscard d'Estaing en novembre 1963 (contrôle des prix, restriction du crédit, réduction des droits de douane).",n:"Le retour des pieds-noirs est un choc de demande positif à court terme (boost de la consommation) mais négatif à moyen terme (tensions inflationnistes, déséquilibres salariaux). Il force l'abandon de la politique de laisser-faire et le retour à la rigueur dès 1963."},
  {tag:"Phases de croissance",tc:"t1",type:"Phase 3",q:"Quelles sont les caractéristiques de la troisième phase (1964-1967) ouverte par le Plan de stabilisation ?",a:"Croissance du PIB à 5,4% en moyenne. Gains de productivité constants. Budgets 1964 et 1965 en équilibre. Hausse des prix ralentie à 3% en moyenne. Deux ralentissements : 1964-1965 (effet direct du plan de stabilisation) et 1966-1967 (conséquence de la récession allemande).",n:"Cette phase illustre le coût à court terme de la politique de rigueur : la croissance recule de 8,1% à 5,4%, le chômage repart légèrement à la hausse. Mais les fondamentaux sont assainis (équilibre budgétaire, inflation contenue), préparant la reprise qui précédera mai 1968."},
  {tag:"Phases de croissance",tc:"t1",type:"Phase 4 - Mai 68",q:"Quels sont les effets économiques immédiats et différés de la crise de mai-juin 1968 ?",a:"Effets immédiats : chute brutale de la production industrielle (reprise énergique dès juillet 1968). Accords de Grenelle (25-27 mai 1968) : +30% du SMIG, +10% en moyenne pour les autres salaires. Effets différés : +19% de masse monétaire, +7,2% d'inflation en un an, balance commerciale passant d'excédentaire à fortement déficitaire, réserves d'or de la BdF réduites de 30%.",n:"La reprise rapide de la production industrielle dès juillet 1968 montre que l'économie française est structurellement robuste. Mais les effets financiers (inflation, fuite des capitaux, balance commerciale) sont durables et forcent la dévaluation de 1969 que DG avait refusée."},
  {tag:"Phases de croissance",tc:"t1",type:"Phase 5 - Pompidou",q:"Quelles sont les mesures économiques de la cinquième phase (1969-1973) sous Pompidou, et leurs conséquences ?",a:"Dévaluation du franc de 11% en août 1969 (répondant aux vœux du patronat). Relance de la croissance mais aussi de l'inflation. Poursuite de la productivité du travail. Création du SMIC (substitué au SMIG), indexation du minimum vital sur l'inflation. 'Contrats de progrès' favorisant une indexation générale des salaires.",n:"La dévaluation de 11% donne à Pompidou une marge de manœuvre économique que DG avait refusé de prendre. Elle permet une relance forte, mais au prix d'une inflation structurelle que les 'contrats de progrès' institutionnalisent. C'est la marque de fabrique pompidolienne : croissance forte, inflation tolérée."},

  // ── AGRICULTURE ──
  {tag:"Modernisation agricole",tc:"t6",type:"Structures",q:"Quelles sont les institutions créées par la loi d'orientation agricole de 1960-1962, et quels sont leurs rôles ?",a:"SAFER (Sociétés d'aménagement foncier et d'établissement rural) : droit de préemption prioritaire sur l'achat des terres agricoles, pour les remembrer, les équiper et les céder aux exploitants. Encouragement des groupements de producteurs et coopératives. Appui sur le CNJA (Centre national des Jeunes Agriculteurs) présidé par Michel Debatisse, issu de la JAC (440 000 adhérents en 1955).",n:"Les SAFER sont un outil original : elles ne nationalisent pas les terres mais exercent un droit de préemption qui permet de restructurer le marché foncier sans expropriation. C'est une intervention étatique compatible avec l'économie de marché — caractéristique de la planification indicative à la française."},
  {tag:"Modernisation agricole",tc:"t6",type:"Bilan chiffré",q:"Quel est le bilan chiffré de la modernisation agricole entre 1958 et 1974 ?",a:"Part de l'agriculture dans la population active : de 25% en 1958 à 12% en 1972. Tracteurs : de 44 000 en 1946 à 1 500 000 en 1980. Consommation d'engrais quintupl de 1950 à 1978. Productivité : +6,3% par an de 1952 à 1974. Résultat : 1er rang européen pour la production, 2e rang mondial pour l'exportation.",n:"Ces chiffres illustrent une transformation radicale sur un quart de siècle. La France passe d'une agriculture paysanne archaïque à une agriculture industrielle performante — au prix d'un exode rural massif et d'une chimisation intensive dont les effets environnementaux ne seront perçus que bien plus tard."},
  {tag:"Modernisation agricole",tc:"t6",type:"Marché commun agricole",q:"Quand et comment est créé le Marché commun agricole, et quel est l'échange politique qui le rend possible ?",a:"Création en 1962. Système de prix garantis et de subventions permettant aux agriculteurs français de bénéficier du large marché européen. Rapport Mansholt (1968) : préconise la suppression de la moitié des agriculteurs de la CEE en dix ans. Échange politique : la France accepte la libéralisation industrielle (droits de douane, contingentements) en contrepartie de la mise en place du Marché commun agricole.",n:"La PAC (Politique agricole commune) deviendra le premier poste budgétaire de la CEE/UE, et le symbole le plus controversé de l'intégration européenne. En 1962, elle est une victoire diplomatique française — la France impose ses conditions à ses partenaires en échange de sa 'bonne volonté' industrielle."},
  {tag:"Modernisation agricole",tc:"t6",type:"Résistances",q:"Quelles sont les formes de résistance du monde rural à la modernisation agricole dans les années 1960 ?",a:"Manifestations et barrages routiers et ferroviaires contre la politique de modernisation. Inquiétudes suscitées par le Marché commun agricole (concurrence pour le vin, fruits, légumes, produits laitiers). La France perd la maîtrise des prix de certains produits (viande, lait). 1 350 000 exploitations sur 1 500 000 sont inférieures à 50 ha (en dessous du seuil moyen de rentabilité).",n:"Ces résistances s'expliquent par le clivage entre les bénéficiaires de la modernisation (jeunes agriculteurs du CNJA, grandes exploitations du Bassin parisien) et ses victimes (petits paysans du Massif central, de l'Ouest et du Sud-Ouest). La modernisation agricole reproduit à l'échelle du monde rural les inégalités que la croissance crée à l'échelle nationale."},

  // ── MODERNISATION INDUSTRIELLE ──
  {tag:"Modernisation industrielle",tc:"t3",type:"Concentrations",q:"Comment évolue le nombre de concentrations d'entreprises entre 1950 et 1970, et quelles mesures les favorisent ?",a:"De 1950 à 1960 : 850 concentrations de SA. De 1961 à 1970 : 1850 concentrations (plus du double). Mesures favorisantes : Ve Plan encourageant les fusions par des avantages fiscaux, achat d'actions et fusions d'entreprises. En 1967 : création des 'Groupements d'intérêt économique' (GIE) permettant aux entreprises de coopérer tout en conservant leur indépendance.",n:"Cette accélération des concentrations suit directement l'ouverture des frontières et les Ve et VIe plans. Elle transforme progressivement le tissu industriel français, encore dominé par les PME familiales en 1958, en un ensemble d'entreprises plus grandes et plus compétitives."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Secteur public",q:"Quelles sont les principales restructurations du secteur public industriel sous la Ve République ?",a:"Raffinage pétrolier : création de l'ERAP. Banque : fusion de la BNCI et du Comptoir national d'Escompte donnant naissance à la BNP en 1965. Moteurs d'avion : la SNECMA absorbe Hispano. Aéronautique : Nord-Aviation et Sud-Aviation fusionnent. Plan Calcul (1968-1970) : programme informatique pour ne plus dépendre des États-Unis. Programme spatial : mis au point pour 1969-1970.",n:"Ces restructurations du secteur public montrent que l'État modernise d'abord là où il est maître d'œuvre, avant d'inciter le secteur privé à suivre. La BNP (1965) est l'exemple le plus durable : elle existe encore aujourd'hui comme l'un des premiers groupes bancaires mondiaux."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Secteur privé",q:"Quelles sont les principales conventions sectorielles signées par l'État avec le secteur privé pour encourager la modernisation industrielle ?",a:"Convention avec la sidérurgie en 1966 : l'État promet des aides en échange d'engagements de modernisation. Convention avec la construction navale en 1968. Plan Calcul pour l'informatique (1968-1970). Programme spatial. Groupes financiers privés (Suez, Rothschild, Empain-Schneider, Paribas) investissant massivement dans l'industrie.",n:"Ces conventions sont un outil typique de la planification à la française : l'État ne contraint pas, il incite par des aides conditionnelles à des engagements de transformation. La convention sidérurgique de 1966 donnera à la sidérurgie un sursis de quelques années — avant la grande crise des années 1970-1980."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Part de l'industrie",q:"Comment évolue le poids de l'industrie dans l'économie française entre 1958 et 1973 ?",a:"Part de l'industrie dans le PIB : atteint 38,8% en 1973. Pourcentage de la population active dans l'industrie : ne cesse d'augmenter, atteignant 40% en 1962. Nombre de petites entreprises : diminue sensiblement. Renault, premier groupe français, n'est que 22e mondial.",n:"Ces chiffres témoignent d'une véritable industrialisation de la France sur cette période. Mais l'absence de grands groupes internationaux dans la chimie, l'informatique, la mécanique ou le matériel électrique montre les limites de cette industrialisation : forte en volume, mais pas en compétitivité internationale."},
  {tag:"Modernisation industrielle",tc:"t3",type:"Champions nationaux",q:"Quels sont les quelques grands groupes français de taille internationale existants en 1974, et dans quels secteurs ?",a:"Automobile : Renault (nationalisé), Peugeot-Citroën (en cours de fusion dans les années 1970). Pneumatiques : Michelin. Aluminium : Péchinay-Ugine-Khülmann. Secteurs sans groupe de taille internationale : chimie, informatique, mécanique, matériel électrique, sidérurgie.",n:"Cette liste révèle la spécialisation de l'industrie française dans des secteurs de masse (automobile, matériaux) plutôt que dans les industries de haute technologie où se joueront les compétitions des décennies suivantes. La faiblesse en informatique et chimie fine sera particulièrement pénalisante."},

  // ── AMÉNAGEMENT DU TERRITOIRE ──
  {tag:"Aménagement du territoire",tc:"t7",type:"Institutions",q:"Quelles sont les institutions créées sous de Gaulle pour coordonner l'aménagement du territoire, et quand sont-elles mises en place ?",a:"1963 : création de la DATAR (Délégation à l'aménagement du territoire et à l'attractivité régionale), dirigée par Olivier Guichard. 1964 : création des 'préfets de région' et des CODER (Commissions de développement économique régional). Ces institutions couvrent les vingt-deux 'régions du programme'. 1969 : projet de réforme de régionalisation confié à Jean-Marcel Jeanneney, soumis à référendum — que de Gaulle perd.",n:"La DATAR est une institution originale : rattachée au Premier ministre et non à un ministère sectoriel, elle coordonne l'action de tous les ministères sur les questions de développement territorial. Elle incarne l'approche gaullienne : une institution légère, animée par des technocrates, chargée de corriger les défaillances du marché."},
  {tag:"Aménagement du territoire",tc:"t7",type:"Déséquilibres",q:"Quelles régions souffrent des déséquilibres structurels liés à la modernisation, et lesquelles en bénéficient ?",a:"Régions en difficulté : Alsace et Nord-Normandie (textile en crise), Nord (charbon en déclin), Lorraine (sidérurgie), Ouest, Massif Central, Sud-Ouest (agriculture archaïque et industries traditionnelles). Régions bénéficiaires : Île-de-France (concentration des activités dynamiques), Nord, Vallée du Rhône.",n:"Jean-François Gravier avait anticipé ce phénomène dès 1946 dans 'Paris et le désert français.' Sa thèse — que la croissance bénéficie essentiellement à Paris au détriment du reste — se vérifie amplement dans les années 1960-1970, malgré les efforts de la DATAR."},

  // ── INFLATION ──
  {tag:"Inflation",tc:"t1",type:"Causes",q:"Quelles sont les causes conjoncturelles et structurelles de l'inflation française chronique entre 1958 et 1974 ?",a:"Causes conjoncturelles : guerre d'Algérie (jusqu'en 1962), retour des pieds-noirs (1962), crise de mai-juin 1968. Causes structurelles : poids des syndicats, politique contractuelle dans les entreprises publiques, création du SMIC indexé sur l'inflation, 'contrats de progrès' aboutissant à une indexation générale, anticipations inflationnistes et spéculation.",n:"Les gouvernements trouvent dans l'inflation des avantages politiques : elle finance la croissance sans douleur, rend la pression fiscale presque indolore, et facilite le remboursement des dettes (État et classes moyennes endettées pour leur logement). L'inflation est ainsi tolérée car ses victimes (rentiers, épargnants, détenteurs de revenus fixes) sont politiquement moins influentes que ses bénéficiaires."},
  {tag:"Inflation",tc:"t1",type:"Plans de stabilisation",q:"Quelles sont les deux grandes politiques de stabilisation mises en place pour lutter contre l'inflation, et par qui sont-elles portées ?",a:"Plan Pinay-Rueff (décembre 1958) : lutte contre l'inflation comme priorité, maintient le taux d'inflation en dessous de 4% jusqu'à l'automne 1962. Plan de stabilisation de Giscard d'Estaing (novembre 1963) : contrôle des prix, restriction du crédit, réduction des droits de douane — stabilise la situation jusqu'en 1966, aidé par la récession allemande.",n:"Ces deux plans sont identiques dans leur logique : rigueur budgétaire + contrôle des prix + restriction du crédit. Leur efficacité est réelle mais temporaire — dès que la rigueur est levée, les causes structurelles de l'inflation reprennent leurs droits. Le problème structurel ne sera jamais résolu sous la Ve."},
  {tag:"Inflation",tc:"t1",type:"Mai 68",q:"Quels sont les chiffres précis de l'impact de mai 1968 sur l'inflation et les finances françaises ?",a:"Accords de Grenelle (25-27 mai 1968) : +30% du SMIG, +10% en moyenne pour les autres salaires. Conséquences : +19% de masse monétaire, +7,2% d'inflation en un an. Balance commerciale : de excédentaire à fortement déficitaire. Réserves d'or de la BdF : réduites de 30%. Dévaluation finalement décidée par Pompidou en août 1969 : -11%.",n:"Ces chiffres permettent de comprendre pourquoi de Gaulle refuse de dévaluer en novembre 1968 : il aurait fallu dévaluer 'officiellement' alors que la tempête était à son maximum. Pompidou attend août 1969, quand les esprits se sont calmés, pour effectuer une dévaluation qui paraît moins une capitulation qu'un ajustement."},
  {tag:"Inflation",tc:"t1",type:"Inconvénients",q:"Quels sont les inconvénients économiques concrets de l'inflation pour les agents économiques français ?",a:"Elle ampute les revenus réels des détenteurs de revenus fixes, des rentiers, des souscripteurs à des emprunts d'État et des détenteurs de comptes d'épargne. Surtout, en renchérissant les prix français, elle freine les exportations et favorise les importations — menaçant l'équilibre de la balance commerciale.",n:"Ce dernier point est décisif : l'inflation met en contradiction les deux piliers de la politique gaullienne (défense du franc + ouverture extérieure). Si les prix français sont plus élevés que ceux des concurrents, les exportations souffrent — menaçant l'équilibre commercial que DG considère comme une condition de l'indépendance nationale."},

  // ── COMMERCE EXTÉRIEUR ──
  {tag:"Commerce extérieur",tc:"t2",type:"Balance commerciale",q:"Comment évolue la balance commerciale française entre 1959 et 1974 ?",a:"1959-1963 : balance commerciale excédentaire. 1965 : de nouveau excédentaire grâce au Plan de stabilisation. Après 1965 : détérioration continue, menaçant de tomber en dessous du niveau d'équilibre (95%). Points de fragilité : énergie (dépendance croissante) et produits manufacturés (dégradation forte). Point fort : produits agricoles et alimentaires.",n:"La structure de la balance commerciale révèle la spécialisation de la France : elle exporte bien ses excédents agricoles (PAC aidant) mais importe de plus en plus de produits industriels sophistiqués et d'énergie. Cette structure est viable tant que le pétrole est bon marché — elle devient insoutenable après 1973."},
  {tag:"Commerce extérieur",tc:"t2",type:"Remboursement de la dette",q:"Comment la France rembourse-t-elle sa dette extérieure pendant la deuxième phase de croissance (1959-1962) ?",a:"De 1959 à 1962, la France rembourse par anticipation la plus grande partie de sa dette extérieure, contractée pendant les années difficiles de la reconstruction. Ce remboursement anticipé est rendu possible par l'excédent de la balance des paiements et l'afflux des capitaux étrangers attirés par la solidité retrouvée du franc.",n:"Ce remboursement anticipé est l'un des actes symboliques les plus forts de la politique gaullienne : il signifie que la France n'est plus sous la dépendance financière des États-Unis et du FMI. DG peut désormais mettre en pratique sa politique d'indépendance monétaire — y compris en demandant la conversion en or des dollars détenus par la France."},

  // ── PLANS ──
  {tag:"Plans quinquennaux",tc:"t3",type:"Liste des plans",q:"Quels sont les objectifs des différents plans quinquennaux sous la Ve République (IIIe au VIe plans) ?",a:"IIIe plan (1958-1961) : réduire le déficit des finances publiques et l'inflation. IVe plan (1962-1965) : développer les équipements collectifs en prenant en compte la poussée démographique. Ve plan (1965-1970) : modernisation, notamment du secteur industriel d'État, encouragement à la réorganisation des branches-pilotes. VIe plan (1970-1975) : poursuite de la modernisation, encouragement de l'investissement privé pour substituer aux interventions publiques.",n:"L'évolution des plans illustre le tournant libéral : les premiers plans (IIIe, IVe) sont encore centrés sur la correction des grands déséquilibres et l'investissement public ; les derniers (Ve, VIe) visent à transférer la responsabilité de l'investissement vers le secteur privé. L'État se retire progressivement de son rôle économique direct."},
  {tag:"Plans quinquennaux",tc:"t3",type:"Ardente obligation",q:"Quelle expression De Gaulle utilise-t-il pour qualifier la planification, et que révèle-t-elle de sa vision ?",a:"De Gaulle parle de 'l'ardente obligation du Plan' — expression forte qui place la planification au même niveau qu'un impératif moral ou national. Cela révèle que pour DG, le plan n'est pas un simple outil technique mais une manifestation de la volonté collective de la nation de maîtriser son destin économique.",n:"Cette formule illustre comment DG articule économie et politique : la planification est un acte de souveraineté nationale, pas une simple coordination des investissements. Elle s'inscrit dans une vision où l'État est l'expression de la volonté générale — et donc responsable de l'orientation économique du pays."},

  // ── POLITIQUE ÉCONOMIQUE DG ──
  {tag:"Politique économique DG",tc:"t1",type:"Comité Rueff-Armand",q:"Quel est le rôle du comité Rueff-Armand, et quand est-il créé ?",a:"Créé pour discerner et proposer des correctifs aux rigidités de tout ordre, obstacles à l'adaptation harmonieuse de l'économie française aux conditions du marché. Il représente l'approche pragmatique de DG : identifier les blocages réels de l'économie et proposer des solutions concrètes, sans dogmatisme idéologique.",n:"Le Comité Rueff-Armand (du nom de l'économiste libéral Jacques Rueff et de l'industriel Louis Armand) est chargé notamment de dénoncer les professions réglementées, les monopoles, les rigidités du marché du travail. Son rapport sera une source d'inspiration pour les réformes libérales ultérieures."},
  {tag:"Politique économique DG",tc:"t1",type:"Convictions de DG",q:"Quelles sont les trois grandes convictions économiques de De Gaulle qui guident sa politique ?",a:"1) L'État a une responsabilité majeure dans le maintien des grands équilibres : équilibre budgétaire (déficit supprimé en 1965), balance des paiements, valeur de la monnaie. 2) L'État doit placer la France dans la compétition internationale par la modernisation des structures économiques — d'où l'ouverture en 1958. 3) L'État doit encourager les initiatives dans les filières novatrices (nucléaire, aéronautique, spatial, informatique).",n:"Ces trois convictions forment un triangle cohérent : rigueur des grands équilibres + ouverture pour moderniser + soutien aux filières d'avenir. Ce n'est ni du libéralisme pur ni du dirigisme soviétique — c'est une troisième voie spécifiquement française que les Ve et VIe plans tentent de mettre en œuvre."},
  {tag:"Politique économique DG",tc:"t1",type:"Formules",q:"Quelles sont les deux formules emblématiques de De Gaulle sur l'économie, et que signifient-elles réellement ?",a:"'L'intendance suivra' (apocryphe, souvent mal interprétée comme du mépris pour l'économie). 'La politique de la France ne se fait pas à la corbeille' (authentique) : exprime un héritage catholique qui redoute que l'argent pollue les valeurs sociales, non une méfiance envers les mécanismes économiques.",n:"Ces deux formules illustrent le problème de l'interprétation des discours politiques : la première, apocryphe, a alimenté la légende d'un DG indifférent à l'économie ; la seconde, authentique, est bien plus nuancée. DG est en réalité un président très attentif aux questions économiques, qui multiplie les conseils restreints économiques après 1962."},
  {tag:"Politique économique DG",tc:"t1",type:"Rôle de Pompidou",q:"En quoi la pratique économique de Pompidou diffère-t-elle de celle de De Gaulle, et quels éléments de continuité persistent ?",a:"Différences : Pompidou est plus sensible aux sollicitations patronales (carrière chez Rothschild), consent à dévaluer le franc en 1969, accentue le tournant libéral (SMIC, contrats de progrès). Continuités : poursuit la modernisation et la concentration industrielle, insiste sur 'l'impératif industriel', maintient la planification quinquennale.",n:"Le vrai tournant libéral s'opère dès 1962 avec l'arrivée de VGE au ministère des Finances, soit sous DG lui-même — ce qui nuance l'idée d'une rupture Pompidou/de Gaulle. La continuité profonde est plus forte que les différences de style et de sensibilité."},

  // ── SECTEURS EN CRISE ──
  {tag:"Secteurs en crise",tc:"t7",type:"Textile",q:"Pourquoi le secteur textile est-il en crise et quels sont ses effets géographiques ?",a:"Concurrencé par les produits des pays à faibles coûts de main-d'œuvre : Italie, Grèce, Portugal. Cascade de faillites en Alsace et dans le Nord de la Normandie. Le gouvernement tente une modernisation des structures du textile avec peu de résultats significatifs.",n:"La crise textile préfigure la désindustrialisation qui frappera ces régions dans les décennies suivantes. Elle illustre le paradoxe de la libéralisation : en ouvrant les frontières, on modernise les secteurs compétitifs mais on accélère l'agonie des secteurs non compétitifs."},
  {tag:"Secteurs en crise",tc:"t7",type:"Charbon",q:"Pourquoi le charbon est-il en crise, et quelles sont les réponses institutionnelles et sociales ?",a:"Le charbon perd sa compétitivité face à la montée des hydrocarbures. Le Plan Jeanneney prévoit la fermeture des puits les moins rentables, pesant comme une menace sur une profession considérée comme condamnée. La grande grève des mineurs de 1963 sonne comme un cri d'alarme contre ce déclin programmé.",n:"La grève des mineurs de 1963 est l'une des plus grandes grèves de la Ve République. Elle révèle la tension entre la logique économique (fermer les mines non rentables) et la réalité sociale (des centaines de milliers de mineurs sans reconversion possible). Ce conflit préfigure les grandes crises de reconversion industrielle des années 1980."},
  {tag:"Secteurs en crise",tc:"t7",type:"Sidérurgie",q:"Pourquoi la crise de la sidérurgie est-elle 'inattendue', et quelle est la réponse de l'État ?",a:"La crise est inattendue car le marché mondial apparaît saturé au milieu des années 1960, alors que les entreprises françaises sont pourtant suffisamment concentrées pour affronter la concurrence. L'État réagit en signant en 1966 une convention avec la sidérurgie, avec pour objectif la modernisation de ses structures — donnant à l'industrie un sursis de quelques années.",n:"Ce sursis sera de courte durée : la sidérurgie lorraine connaîtra sa grande crise dans les années 1978-1984, avec des licenciements massifs et des violences sociales à Longwy et Denain. La convention de 1966 n'a repoussé que temporairement une restructuration inévitable."},
  {tag:"Secteurs en crise",tc:"t7",type:"Agriculture",q:"Quelle est la situation des petites exploitations agricoles au milieu des années 1960 ?",a:"1 350 000 exploitations sur 1 500 000 sont inférieures à 50 ha — en dessous du seuil moyen de rentabilité de l'époque. Le secteur du commerce et de l'artisanat connaît également de graves difficultés. Ces petites entreprises sont condamnées à la disparition lorsqu'elles sont inadaptées aux conditions du marché.",n:"Ces chiffres illustrent pourquoi la modernisation agricole s'accompagne d'un exode rural massif : la grande majorité des exploitations est économiquement non viable dans le cadre du Marché commun. La SAFER et les lois d'orientation de 1960-1962 tentent d'accompagner cette transition, mais ne peuvent pas la stopper."},

  // ── GRANDS ÉQUILIBRES ──
  {tag:"Grands équilibres",tc:"t2",type:"Équilibre budgétaire",q:"Comment évoluent les finances publiques françaises entre 1958 et 1974, et quand l'équilibre budgétaire est-il atteint ?",a:"Déficit budgétaire permanent depuis 1949 à l'arrivée de DG. Forte baisse du déficit pendant la 2e phase (1959-1963). Budgets 1964 et 1965 en équilibre — objectif affiché par DG depuis 1958. Financement de l'impasse budgétaire par l'épargne (non par la création monétaire) pour éviter l'inflation.",n:"L'équilibre budgétaire de 1965 est une date symbolique pour DG : il prouve que la rigueur gaullienne a porté ses fruits en moins de 10 ans. C'est aussi l'année du plein effet de VGE au ministère des Finances et du Plan de stabilisation. La rigueur paye — à court terme."},
  {tag:"Grands équilibres",tc:"t2",type:"Or et monnaie",q:"Comment évolue l'encaisse-or de la Banque de France entre 1959 et 1969 ?",a:"Réserves d'or de la BdF multipliées par 5 pendant la 2e phase (1959-1963). Réserves d'or réduites de 30% à la suite des accords de Grenelle et de la fuite des capitaux après mai 1968. Dévaluation de 11% par Pompidou en août 1969. Dévaluation initiale de 17,4% dans le plan Pinay-Rueff (décembre 1958).",n:"La politique de l'or de DG a une dimension politique internationale : en convertissant les dollars de la BdF en or, DG conteste le privilège exorbitant du dollar dans le système de Bretton Woods. Cette politique de retrait de l'or est une des expressions les plus concrètes de son anti-atlantisme économique."}
];

let mode = 'idees', activeTag = 'Toutes';
let deck = [...IDEES];
let cur = 0, flipped = false, score = 0;

function getTags(d){ return ['Toutes',...[...new Set(d.map(c=>c.tag))]]; }

function buildFilters(){
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  const src = mode==='idees' ? IDEES : FAITS;
  const tags = getTags(src);
  tags.forEach(t => {
    const b = document.createElement('button');
    const isActive = t === activeTag;
    b.className = 'fb' + (isActive ? (mode==='idees'?' active-g':' active') : '');
    b.textContent = t + ' (' + (t==='Toutes' ? src.length : src.filter(c=>c.tag===t).length) + ')';
    b.onclick = function(){ activeTag = t; deck = t==='Toutes' ? [...src] : src.filter(c=>c.tag===t); cur=0; score=0; flipped=false; buildFilters(); resetView(); render(); };
    bar.appendChild(b);
  });
}

function switchDeck(m){
  mode = m;
  activeTag = 'Toutes';
  const src = m==='idees' ? IDEES : FAITS;
  deck = [...src];
  cur=0; score=0; flipped=false;
  document.getElementById('pbar').style.background = m==='idees' ? '#1D9E75' : '#534AB7';
  document.getElementById('btnIdees').className = 'deck-btn' + (m==='idees' ? ' active-ideas' : '');
  document.getElementById('btnFaits').className = 'deck-btn' + (m==='faits' ? ' active-facts' : '');
  buildFilters(); resetView(); render();
}

function resetView(){
  document.getElementById('cardArea').style.display='block';
  document.getElementById('hint').style.display='block';
  document.getElementById('scoreBox').style.display='none';
}

function render(){
  const c = deck[cur];
  document.getElementById('pbar').style.width = ((cur+1)/deck.length*100)+'%';
  document.getElementById('counter').textContent = 'Carte '+(cur+1)+' / '+deck.length;
  document.getElementById('ci').classList.remove('flipped'); flipped=false;
  document.getElementById('ftag').textContent = c.tag;
  document.getElementById('ftag').className = 'tag '+c.tc;
  document.getElementById('ftype').textContent = c.type;
  document.getElementById('fq').textContent = c.q;
  document.getElementById('btag').textContent = c.tag;
  document.getElementById('btag').className = 'tag '+c.tc;
  document.getElementById('ba').textContent = c.a;
  document.getElementById('bn').textContent = c.n;
  document.getElementById('hint').textContent = 'Cliquer sur la carte pour révéler la réponse';
  document.getElementById('btns').innerHTML = '';
}

function flip(){
  if(flipped) return;
  flipped = true;
  document.getElementById('ci').classList.add('flipped');
  document.getElementById('hint').textContent = '';
  document.getElementById('btns').innerHTML = '<button class="btn btn-ok" onclick="next(true)">✓ Je savais</button><button class="btn btn-ko" onclick="next(false)">✗ À revoir</button>';
}

function next(ok){
  if(ok) score++;
  if(cur < deck.length-1){ cur++; render(); }
  else { showScore(); }
}

function showScore(){
  document.getElementById('cardArea').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('btns').innerHTML='';
  const pct = Math.round(score/deck.length*100);
  document.getElementById('scoreBox').style.display='block';
  document.getElementById('scoreBox').innerHTML = '<div class="score-big">'+score+' / '+deck.length+'</div><div class="score-label">soit '+pct+' % de réussite</div><div style="margin-top:1.5rem"><button class="btn" onclick="restart()">↺ Recommencer</button></div>';
}

function restart(){
  cur=0; score=0; flipped=false;
  resetView(); render();
}

buildFilters(); render();
</script>
